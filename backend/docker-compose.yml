version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nibiru-nft-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nibiru
      POSTGRES_PASSWORD: nibiru_secret
      POSTGRES_DB: nibiru_nft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nibiru-nft-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4
    container_name: nibiru-nft-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nibiru.fi
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
